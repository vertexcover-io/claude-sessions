# Stack config for the `prod` stack.
#
# Plaintext values are committed; secrets are encrypted by Pulumi and safe to
# commit. Populate secrets once with `pulumi config set --secret <key> <value>`
# (see infra/README.md). The placeholders below are NOT real secrets — replace
# them via the CLI so Pulumi stores ciphertext, then drop these comment stubs.
config:
  azure-native:location: centralindia
  # Deterministic `fake` embeddings — no OpenAI key required. Switch to `openai`
  # (and add an openaiApiKey secret) only when real embeddings are needed.
  claude-sessions:embedProvider: fake
  claude-sessions:githubOrg: vertexcover-io
  # claude-sessions:appBaseUrl is set after the first `pulumi up` reveals the
  # Container App FQDN (see README step 6). Leave unset on the very first apply.
  #
  # Secrets — set via: pulumi config set --secret claude-sessions:<key> <value>
  #   jwtSecret           (openssl rand -hex 32)
  #   pgAdminPassword     (strong password)
  #   githubClientId
  #   githubClientSecret
  #
  # Image tag — overridden per-deploy by CI via
  #   pulumi up --config claude-sessions:image=<acr>/claude-sessions:<sha>
  # Defaults to :latest for a manual local apply.
  claude-sessions:image: ""
