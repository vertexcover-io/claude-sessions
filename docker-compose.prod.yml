services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claude-sessions-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-claude_sessions}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - claude_sessions_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-claude_sessions}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  claude_sessions_pg:
