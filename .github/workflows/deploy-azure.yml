name: Deploy claude-sessions

# Build the claude-sessions image, push it to refrens' private ACR, and roll the
# Azure App Service to it. Modeled on the Serana "Delivery pipeline":
# direct-to-production (no staging-slot swap), triggered by GitHub `deployment`
# events so the environment (prod/...) comes from the deployment payload.
#
# Runs in refrens/horizon (the refrens-owned mirror of this source). All AZURE_*_<ENV>
# secrets/vars are provisioned by Pulumi (refrens/azure) once this repo is in the
# `repositories` list:
#   AZURE_ACR_USERNAME_<ENV> / AZURE_ACR_PASSWORD_<ENV>  (registry.ts)
#   AZURE_CREDENTIALS_<ENV> / AZURE_RESOURCE_GROUP_<ENV>  (rg.ts)
#   AZURE_CLAUDESESSIONS_SERVICE_NAME_<ENV>               (AppService index.ts:375)

on: [deployment]

concurrency:
  group: deploy-claude-sessions-${{ github.event.deployment.environment }}
  cancel-in-progress: true

run-name: Deploy claude-sessions (${{ github.event.deployment.environment }}) ${{ github.event.deployment.sha }}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.deployment.environment }}
    env:
      ENV: ${{ github.event.deployment.environment }}
      AZURE_ACR_USERNAME: ${{ vars[format('AZURE_ACR_USERNAME_{0}', github.event.deployment.environment)] }}
      AZURE_ACR_PASSWORD: ${{ secrets[format('AZURE_ACR_PASSWORD_{0}', github.event.deployment.environment)] }}
      AZURE_CREDENTIALS: ${{ secrets[format('AZURE_CREDENTIALS_{0}', github.event.deployment.environment)] }}
      AZURE_RESOURCE_GROUP: ${{ vars[format('AZURE_RESOURCE_GROUP_{0}', github.event.deployment.environment)] }}
      AZURE_SERVICE_NAME: ${{ vars[format('AZURE_CLAUDESESSIONS_SERVICE_NAME_{0}', github.event.deployment.environment)] }}
      ACR_REPOSITORY: claudesessions

    steps:
      - name: Mark deployment in progress
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ github.event.deployment.id }}
          state: in_progress

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_ACR_USERNAME }}.azurecr.io
          username: ${{ env.AZURE_ACR_USERNAME }}
          password: ${{ env.AZURE_ACR_PASSWORD }}

      - name: Set Docker tags
        id: set-tags
        env:
          ACR_REGISTRY: ${{ env.AZURE_ACR_USERNAME }}.azurecr.io
          DEPLOY_SHA: ${{ github.event.deployment.sha }}
        run: |
          set -euo pipefail
          R="$ACR_REGISTRY/$ACR_REPOSITORY"
          echo "tags=${R}:latest,${R}:${ENV},${R}:${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.set-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      # Direct-to-production: the App Service is pinned to <acr>/claudesessions:latest,
      # so a restart forces a pull of the freshly pushed image. No staging-slot swap.
      - name: Restart App Service (pull new :latest)
        run: |
          az webapp restart \
            -n "${{ env.AZURE_SERVICE_NAME }}" \
            -g "${{ env.AZURE_RESOURCE_GROUP }}"

      - name: Mark deployment success
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ github.event.deployment.id }}
          state: success

      - name: Mark deployment failure
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ github.event.deployment.id }}
          state: failure
