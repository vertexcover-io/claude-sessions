name: Deploy claude-sessions

# Build the claude-sessions image, push it to refrens' private ACR, and roll the
# Azure App Service to it. Modeled on the Serana "Delivery pipeline" but simplified:
# direct-to-production (no staging-slot swap) and triggered directly on push to
# master / manual dispatch instead of GitHub `deployment` events.
#
# Runs in refrens/horizon (the refrens-owned mirror of this source). All AZURE_*_PROD
# secrets/vars are provisioned by Pulumi (refrens/azure) once this repo is in the
# `repositories` list:
#   AZURE_ACR_USERNAME_PROD / AZURE_ACR_PASSWORD_PROD  (registry.ts)
#   AZURE_CREDENTIALS_PROD / AZURE_RESOURCE_GROUP_PROD (rg.ts)
#   AZURE_CLAUDESESSIONS_SERVICE_NAME_PROD             (AppService index.ts:375)

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-claude-sessions-prod
  cancel-in-progress: true

run-name: Deploy claude-sessions (prod) ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: prod
    env:
      AZURE_ACR_USERNAME: ${{ vars.AZURE_ACR_USERNAME_PROD }}
      AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD_PROD }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS_PROD }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
      AZURE_SERVICE_NAME: ${{ vars.AZURE_CLAUDESESSIONS_SERVICE_NAME_PROD }}
      ACR_REPOSITORY: claudesessions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_ACR_USERNAME }}.azurecr.io
          username: ${{ env.AZURE_ACR_USERNAME }}
          password: ${{ env.AZURE_ACR_PASSWORD }}

      - name: Set Docker tags
        id: set-tags
        env:
          ACR_REGISTRY: ${{ env.AZURE_ACR_USERNAME }}.azurecr.io
        run: |
          set -euo pipefail
          R="$ACR_REGISTRY/$ACR_REPOSITORY"
          echo "tags=${R}:latest,${R}:prod,${R}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.set-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      # Direct-to-production: the App Service is pinned to <acr>/claudesessions:latest,
      # so a restart forces a pull of the freshly pushed image. No staging-slot swap.
      - name: Restart App Service (pull new :latest)
        run: |
          az webapp restart \
            -n "${{ env.AZURE_SERVICE_NAME }}" \
            -g "${{ env.AZURE_RESOURCE_GROUP }}"
