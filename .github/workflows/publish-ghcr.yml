name: Publish image to GHCR

# Builds the universal Dockerfile and publishes it to the GitHub Container
# Registry so external deployments (e.g. the refrens Azure App Service) can pull
# a public image without registry credentials. Manual + on version tags.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to publish (in addition to the commit SHA)"
        required: false
        default: "latest"
  push:
    tags:
      - "v*"

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          LOWER_IMAGE="$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          TAGS="${LOWER_IMAGE}:${GITHUB_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${LOWER_IMAGE}:${GITHUB_REF_NAME},${LOWER_IMAGE}:latest"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAGS="${TAGS},${LOWER_IMAGE}:${{ github.event.inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Publishing: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          {
            echo "### GHCR publish"
            echo ""
            echo "- Status: ${{ job.status }}"
            echo "- Tags: \`${{ steps.tags.outputs.tags }}\`"
            echo ""
            echo "> Make the package **public** once (Org → Packages → claude-sessions → Package settings → Change visibility) so it pulls without credentials."
          } >> "$GITHUB_STEP_SUMMARY"
