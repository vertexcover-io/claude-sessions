name: Build check (claude-sessions)

# Verify the production Docker image builds on a clean CI runner, without
# touching Azure/ACR. No secrets, no push, no deploy. Run on demand from the
# Actions tab. This builds the exact same image (context ., ./Dockerfile,
# linux/amd64) that the real deploy pushes to ACR — it just stops before push.

on:
  workflow_dispatch:

concurrency:
  group: build-check-claude-sessions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
