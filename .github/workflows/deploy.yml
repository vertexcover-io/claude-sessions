name: Deploy to exe.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build all packages
        run: bun run build

      - name: Stage deploy payload
        run: |
          set -euo pipefail
          mkdir -p _deploy/scripts
          mkdir -p _deploy/packages/core
          mkdir -p _deploy/packages/adapter-claude
          mkdir -p _deploy/packages/server/src/db
          mkdir -p _deploy/packages/web
          # Ship empty package dirs for workspaces we don't deploy so the
          # root package.json's `workspaces: ["packages/*"]` glob still
          # resolves on the VM. Without this, bun install --frozen-lockfile
          # reports "lockfile had changes" because the lockfile references
          # workspaces (cli, test-config) that aren't on disk.
          mkdir -p _deploy/packages/cli
          mkdir -p _deploy/packages/test-config

          cp -r packages/core/dist                       _deploy/packages/core/dist
          cp    packages/core/package.json               _deploy/packages/core/package.json

          cp -r packages/adapter-claude/dist             _deploy/packages/adapter-claude/dist
          cp    packages/adapter-claude/package.json     _deploy/packages/adapter-claude/package.json

          cp -r packages/server/dist                     _deploy/packages/server/dist
          cp    packages/server/package.json             _deploy/packages/server/package.json
          # Migrations are loaded by dist/src/db/migrate.js from a sibling
          # 'migrations' dir; deploy.sh mirrors src/db/migrations/ into the
          # dist tree at deploy time. We ship the SQL files at the canonical
          # source path so the VM has a single authoritative copy.
          cp -r packages/server/src/db/migrations        _deploy/packages/server/src/db/migrations

          cp -r packages/web/dist                        _deploy/packages/web/dist
          cp    packages/web/package.json                _deploy/packages/web/package.json

          # Workspace manifests only (no dist) for non-deployed packages.
          cp    packages/cli/package.json                _deploy/packages/cli/package.json
          cp    packages/test-config/package.json        _deploy/packages/test-config/package.json

          cp    scripts/deploy.sh                        _deploy/scripts/deploy.sh
          cp    scripts/Caddyfile.template               _deploy/scripts/Caddyfile.template
          chmod +x                                       _deploy/scripts/deploy.sh

          cp    docker-compose.prod.yml                  _deploy/docker-compose.prod.yml
          cp    package.json bun.lock turbo.json         _deploy/

          echo "Staged payload size:"
          du -sh _deploy

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync payload to VM
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.env' \
            --exclude='node_modules' \
            -e "ssh -o StrictHostKeyChecking=yes -o BatchMode=yes" \
            _deploy/ "$SSH_USER@$SSH_HOST:~/claude-sessions/"

      - name: Render .env on VM from secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          EMBED_PROVIDER: ${{ secrets.EMBED_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PORT: ${{ secrets.PORT }}
        run: |
          set -euo pipefail
          : "${JWT_SECRET:?JWT_SECRET secret is required}"
          : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD secret is required}"
          PG_USER="${POSTGRES_USER:-postgres}"
          PG_DB="${POSTGRES_DB:-claude_sessions}"
          PUBLIC_DOMAIN="$SSH_HOST"
          umask 077
          tmp_env=$(mktemp)
          {
            printf 'PUBLIC_DOMAIN=%s\n' "$PUBLIC_DOMAIN"
            printf 'POSTGRES_USER=%s\n' "$PG_USER"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_DB=%s\n' "$PG_DB"
            printf 'DATABASE_URL=postgres://%s:%s@127.0.0.1:5433/%s\n' "$PG_USER" "$POSTGRES_PASSWORD" "$PG_DB"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'EMBED_PROVIDER=%s\n' "${EMBED_PROVIDER:-fake}"
            [ -n "${OPENAI_API_KEY:-}" ] && printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            printf 'PORT=%s\n' "${PORT:-3000}"
            printf 'NODE_ENV=production\n'
            printf 'COOKIE_SECURE=true\n'
          } > "$tmp_env"
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes \
            "$tmp_env" "$SSH_USER@$SSH_HOST:~/claude-sessions/.env"
          ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
            "$SSH_USER@$SSH_HOST" 'chmod 600 ~/claude-sessions/.env'
          rm -f "$tmp_env"

      - name: Invoke deploy.sh on VM
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
            "$SSH_USER@$SSH_HOST" \
            "DEPLOY_SHA='${GITHUB_SHA}' bash -lc '~/claude-sessions/scripts/deploy.sh'"

      - name: Public health check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          PUBLIC_URL="https://${SSH_HOST}"
          echo "Probing ${PUBLIC_URL}/api/health"
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "${PUBLIC_URL}/api/health" | tee /tmp/health.out | grep -q '"ok"'; then
              echo "Public health OK after ${i} attempts."
              exit 0
            fi
            sleep 2
          done
          echo "Public health check failed. Last response:"
          cat /tmp/health.out 2>/dev/null || true
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy ${GITHUB_SHA::7}"
            echo ""
            echo "- Status: ${{ job.status }}"
            echo "- Target: \`${{ secrets.SSH_HOST }}\`"
            echo "- Trigger: \`${{ github.event_name }}\` by \`${{ github.actor }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure hint
        if: failure()
        run: |
          echo "::error::Deploy failed for ${GITHUB_SHA::7}. SSH into the VM and run 'pm2 logs claude-sessions-api --lines 100' to investigate."
